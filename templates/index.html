        <div id="resultModal" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2>Setup Recomendado</h2>
                <div id="resultado-texto">Processando melhor setup...</div>
            </div>
        </div>

        <script>
        document.querySelector('.fom').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const modal = document.getElementById('resultModal');
            const resultadoTexto = document.getElementById('resultado-texto');
            
            resultadoTexto.innerHTML = "Processando o melhor setup...";
            modal.style.display = "block";

            const formData = new FormData(this);

            fetch('/resultado', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.sucesso) {
                    resultadoTexto.innerHTML = `
                        <p style="margin: 12px 0; font-size: 16px;"><strong>• CPU:</strong> ${data.cpu}</p>
                        <p style="margin: 12px 0; font-size: 16px;"><strong>• GPU:</strong> ${data.gpu}</p>
                        <p style="margin: 12px 0; font-size: 16px;"><strong>• Kit Base:</strong> ${data.base}</p>
                        <hr style="border: 1px solid #000000; margin: 15px 0;">
                        <h3 style="color: #000000; text-align: center; font-size: 20px;">Total Estimado: R$ ${data.preco}</h3>
                    `;
                } else {
                    resultadoTexto.innerHTML = `<p style="color: #000000; text-align: center; font-weight: bold;">${data.mensagem}</p>`;
                }
            })
            .catch(error => {
                resultadoTexto.innerHTML = "<p style='color: red; text-align: center;'>Erro ao conectar com o servidor do Flask.</p>";
                console.error('Erro na requisição:', error);
            });
        });

        document.querySelector('.close-button').addEventListener('click', function() {
            document.getElementById('resultModal').style.display = "none";
        });

        window.addEventListener('click', function(e) {
            const modal = document.getElementById('resultModal');
            if (e.target == modal) {
                modal.style.display = "none";
            }
        });
        // Pegando os elementos do HTML
const menuBarras = document.getElementById('menu-barras');
const menuLateral = document.getElementById('menu-lateral');
const fecharMenu = document.getElementById('fechar-menu');

// Função para abrir o menu ao clicar nas 3 barrinhas
menuBarras.addEventListener('click', () => {
  menuLateral.classList.add('ativo');
});

// Função para fechar o menu ao clicar no X
fecharMenu.addEventListener('click', () => {
  menuLateral.classList.remove('ativo');
});

// Opcional: Fecha o menu se clicar em qualquer lugar fora dele
document.addEventListener('click', (e) => {
  if (!menuLateral.contains(e.target) && !menuBarras.contains(e.target)) {
    menuLateral.classList.remove('ativo');
  }
});
        </script>
